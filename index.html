<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🧠 المساعد الذكي – يحلل الصور ويجيب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 25px;
            border: 1px solid #ffcc88;
        }
        h1 { text-align: center; color: #ffdd99; margin-bottom: 8px; }
        .sub { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .chat {
            background: rgba(0,0,0,0.4);
            border-radius: 48px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .message {
            padding: 10px 18px;
            border-radius: 28px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .user {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-radius: 28px 28px 5px 28px;
        }
        .bot {
            background: #1e3a5f;
            color: #eef4ff;
            align-self: flex-start;
            border-radius: 28px 28px 28px 5px;
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 80px;
            padding: 8px 12px;
        }
        textarea {
            flex: 1;
            background: #0f172a;
            border: none;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            font-family: inherit;
            resize: none;
            font-size: 0.9rem;
            outline: none;
        }
        button {
            background: #f97316;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: 0.1s;
        }
        button:active { transform: scale(0.95); }
        .attach-btn {
            background: #2c6e4b;
        }
        .image-preview {
            max-width: 120px;
            border-radius: 16px;
            margin-top: 5px;
        }
        .status {
            background: #00000066;
            border-radius: 40px;
            padding: 6px 15px;
            text-align: center;
            font-size: 0.75rem;
            color: #88ffaa;
            margin-bottom: 15px;
        }
        @media (max-width: 600px) {
            .message { max-width: 95%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <h1>🧠 المساعد الذكي (يحلل الصور)</h1>
    <div class="sub">ارفع صورة أو اكتب سؤالاً – يحلل الصور بالذكاء الاصطناعي ويجيب</div>
    <div class="status" id="statusMsg">✅ جاهز – ارفع صورة أو اكتب سؤالاً</div>
    <div class="chat" id="chatArea">
        <div class="message bot">👋 مرحباً! يمكنك رفع صورة (واجب، رسم، أي شيء) وسأصفها وأجيب على أسئلتك.</div>
    </div>
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="اكتب سؤالك هنا..."></textarea>
        <button class="attach-btn" id="attachBtn" title="رفع صورة"><i class="fas fa-image"></i></button>
        <button id="sendBtn" title="إرسال"><i class="fas fa-paper-plane"></i></button>
    </div>
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
</div>

<script>
    // المتغيرات
    let currentImageBase64 = null;      // base64 بدون رأس (للإرسال إلى الخادم)
    let currentImagePreview = null;     // base64 كامل للعرض
    let isWaiting = false;

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const imageUpload = document.getElementById('imageUpload');
    const statusSpan = document.getElementById('statusMsg');

    function addMessage(text, isUser = false, previewImg = null) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'bot'}`;
        if (previewImg) {
            const img = document.createElement('img');
            img.src = previewImg;
            img.style.maxWidth = '120px';
            img.style.borderRadius = '16px';
            img.style.marginTop = '5px';
            div.appendChild(img);
        }
        div.appendChild(document.createTextNode(text));
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showStatus(msg, isError = false) {
        statusSpan.innerHTML = `<span style="color:${isError ? '#ffaaaa' : '#88ffaa'}">${msg}</span>`;
        setTimeout(() => {
            if (statusSpan.innerHTML.includes(msg)) statusSpan.innerHTML = "✅ جاهز – ارفع صورة أو اكتب سؤالاً";
        }, 5000);
    }

    // رفع الصورة
    attachBtn.onclick = () => imageUpload.click();
    imageUpload.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert("يرجى اختيار صورة"); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentImagePreview = ev.target.result;
            currentImageBase64 = currentImagePreview.split(',')[1];
            addMessage(`📸 تم رفع صورة: ${file.name}`, true, currentImagePreview);
            addMessage("✅ تم استلام الصورة. الآن اكتب سؤالك عنها (مثل: 'ماذا ترى؟'، 'حل المسألة'، 'اكتب قصة عنها').");
        };
        reader.readAsDataURL(file);
        imageUpload.value = '';
    };

    // إرسال الطلب (مع الصورة إن وجدت)
    async function sendMessage() {
        if (isWaiting) return;
        const question = userInput.value.trim();
        if (!question && !currentImageBase64) return;
        userInput.value = '';
        if (question) addMessage(question, true);
        isWaiting = true;
        sendBtn.disabled = true;
        try {
            let reply = "";
            if (currentImageBase64 && question) {
                // هناك صورة وسؤال: نرسلها إلى الخادم لتحليلها
                showStatus("🔍 جاري تحليل الصورة والإجابة... (قد يستغرق 10-15 ثانية)");
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: currentImageBase64, question })
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                const data = await response.json();
                reply = data.answer;
                // بعد الإجابة، نمسح الصورة (اختياري) لتجنب إعادة استخدامها
                currentImageBase64 = null;
                currentImagePreview = null;
            } else if (question) {
                // سؤال عادي (بدون صورة)
                showStatus("🤔 جاري التفكير...");
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                reply = data.answer;
            } else {
                reply = "👈 يرجى كتابة سؤال عن الصورة أو أي شيء آخر.";
            }
            addMessage(reply, false);
            showStatus("✅ تم الرد");
        } catch (err) {
            console.error(err);
            addMessage(`❌ خطأ: ${err.message}`, false);
            showStatus("❌ فشل الاتصال", true);
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
</script>
</body>
</html>
